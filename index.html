<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0e27; /* Dark blue background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url(''); /* Optional: add background image if you want */
            background-size: cover;
        }

        .card {
            background-color: #11183a;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.3);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .profile-img-container {
            width: 126px;
            height: 126px;
            margin: 0 auto 15px;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(to right, #00c6ff, #0072ff);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 24px;
            margin: 10px 0 5px;
            color: #f0f0f0;
        }

        .title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .info-item {
            text-align: left;
            margin: 15px 0;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .label {
            font-size: 12px;
            color: #00c6ff;
            display: block;
            margin-bottom: 5px;
        }

        .value {
            font-size: 15px;
            color: #e0e0e0;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- REPLACE THIS WITH YOUR IMAGE FILE NAME -->
        <div class="profile-img-container">
            <img src="profile.jpg" alt="Profile Picture" class="profile-img">
        </div>

        <h1>Jamil Baculio Ortaleza</h1>
        <div class="title">STUDENT PROFILE</div>

        <div class="info-item">
            <span class="label">FULL NAME</span>
            <span class="value">Jamil Baculio Ortaleza</span>
        </div>

        <div class="info-item">
            <span class="label">ADDRESS</span>
            <span class="value">Puro 5 Wismen Bliss Buug Zamboanga Sibugay</span>
        </div>

        <div class="info-item">
            <span class="label">COURSE</span>
            <span class="value">Bachelor of Science in Information Technology</span>
        </div>

        <div class="footer">
            Mindanao State University - BSIT
        </div>
    </div>
</body>
</html>
